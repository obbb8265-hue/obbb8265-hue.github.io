<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kana Master Pro</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #00ff00; --gray: #444; --light-gray: #888; --coffee: #ffdd00; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 12vh;           
            box-sizing: border-box;      
            height: 100vh; 
            text-align: center; 
        }
        .active { display: flex; }

        /* 首頁 */
        h1 { font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 30px; color: var(--light-gray); }
        .menu-btn { 
            background: transparent; border: 1px solid var(--gray); color: var(--text);
            padding: 15px; margin: 8px; font-size: 1.1rem; border-radius: 8px; width: 220px;
            cursor: pointer;
            text-decoration: none; /* 確保 a 標籤按鈕沒有底線 */
            display: inline-block;
            box-sizing: border-box;
        }
        

        /* 模式切換按鈕組 */
        .toggle-group { margin-bottom: 20px; display: flex; gap: 5px; }
        .toggle-btn { 
            background: #111; border: 1px solid var(--gray); color: var(--light-gray);
            padding: 8px 15px; font-size: 0.9rem; border-radius: 5px; cursor: pointer;
        }
        .toggle-btn.selected { border-color: var(--accent); color: var(--accent); background: #002200; }

        /* 返回按鈕 (極簡) */
        .back-btn { 
            position: fixed; top: 20px; left: 20px; font-size: 0.9rem; color: var(--gray); 
            background: none; border: 1px solid var(--gray); padding: 5px 12px; border-radius: 4px; z-index: 10;
            cursor: pointer;
        }

        /* 測驗區 */
        #word { font-size: 50px; font-weight: bold; transition: 0.2s; }
        #visual-input { font-size: 24px; color: var(--accent); min-height: 30px; margin-top: 10px; letter-spacing: 2px; }
        #meaning { font-size: 20px; color: var(--accent); margin-top: 20px; opacity: 0; transition: 0.3s; }
        #meaning.show { opacity: 1; }
        
        #input-field { position: absolute; opacity: 0; pointer-events: none; }
        .hint-text { position: fixed; bottom: 30px; font-size: 0.8rem; color: #444; letter-spacing: 1px; }
        .shake { animation: shake 0.2s; color: red !important; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

        /* 自選畫面樣式 */
        .select-container { max-height: 62vh; overflow-y: auto; width: 90%; max-width: 420px; margin-bottom: 15px; padding-right: 5px; }
        .main-title { color: var(--text); font-size: 1rem; margin: 20px 0 10px 0; border-left: 3px solid var(--accent); padding-left: 8px; text-align: left; font-weight: bold; }
        
        /* 標題與快捷鍵整合區 */
        .row-header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 5px 0; }
        .row-title { color: var(--light-gray); font-size: 0.8rem; letter-spacing: 1px; margin: 0; }
        .quick-links { font-size: 0.75rem; }
        .quick-btn { color: var(--accent); background: none; border: none; cursor: pointer; padding: 0 4px; opacity: 0.8; }
        .quick-btn:hover { opacity: 1; }
        .divider { color: var(--gray); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .checkbox-btn {
            background: #111; border: 1px solid var(--gray); color: var(--text); padding: 8px 3px;
            font-size: 0.85rem; border-radius: 5px; cursor: pointer; user-select: none;
        }
        .checkbox-btn.checked { border-color: var(--accent); color: var(--accent); background: #002200; }
        .action-btn { background: var(--accent); color: #000; border: none; font-weight: bold; margin-top: 5px; }
   
   /* 新增：底部廣告欄位樣式 */
        .adsense-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8); /* 加上微透黑色背景，確保廣告不會與後方文字打架 */
            padding: 5px 0;
        }
        /* 為了不讓底部廣告擋住測驗畫面的「提示文字」，將提示文字稍微往上推 */
        .hint-text { bottom: 110px !important; } 
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>KANA MASTER</h1>
        
        <div class="toggle-group">
            <button id="btn-random" class="toggle-btn selected" onclick="setOrder(true)">隨機模式</button>
            <button id="btn-order" class="toggle-btn" onclick="setOrder(false)">順序模式</button>
        </div>

        <button class="menu-btn" onclick="startQuiz('hira')">平假名單字 (500)</button>
        <button class="menu-btn" onclick="startQuiz('kata')">片假名單字 (500)</button>
        <button class="menu-btn" style="border-color: var(--accent); color: var(--accent);" onclick="openSelectScreen()">自選五十音模式</button>
        
    </div>

    <div id="select-screen" class="screen">
        <button class="back-btn" onclick="goHomeFromSelect()">BACK</button>
        <h1 style="margin-top: 20px; margin-bottom: 5px;">選擇練習範圍</h1>
        
        <div class="select-container">
            <!-- 平假名大區塊 -->
            <div class="main-title">平假名 (ひらがな)</div>
            
            <div class="row-header">
                <div class="row-title">【清音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('hira', 'seion', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('hira', 'seion', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="hira-seion-grid"></div>
            
            <div class="row-header">
                <div class="row-title">【濁音 / 半濁音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('hira', 'dakuon', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('hira', 'dakuon', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="hira-dakuon-grid"></div>
            
            <div class="row-header">
                <div class="row-title">【拗音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('hira', 'youon', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('hira', 'youon', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="hira-youon-grid"></div>
            
            <!-- 片假名大區塊 -->
            <div class="main-title">片假名 (カタカナ)</div>
            
            <div class="row-header">
                <div class="row-title">【清音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('kata', 'seion', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('kata', 'seion', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="kata-seion-grid"></div>
            
            <div class="row-header">
                <div class="row-title">【濁音 / 半濁音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('kata', 'dakuon', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('kata', 'dakuon', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="kata-dakuon-grid"></div>
            
            <div class="row-header">
                <div class="row-title">【拗音】</div>
                <div class="quick-links">
                    <button class="quick-btn" onclick="bulkSelect('kata', 'youon', true)">全選</button>
                    <span class="divider">|</span>
                    <button class="quick-btn" onclick="bulkSelect('kata', 'youon', false)">清空</button>
                </div>
            </div>
            <div class="grid" id="kata-youon-grid"></div>
        </div>

        <button class="menu-btn action-btn" onclick="startCustomQuiz()">開始測驗！</button>
    </div>

    <div id="quiz-screen" class="screen" onclick="handleScreenClick()">
        <button class="back-btn" onclick="goHome(event)">BACK</button>
        <div id="word">...</div>
        <div id="visual-input"></div>
        <div id="meaning">意思</div>
        <input type="text" id="input-field" autofocus autocomplete="off" autocapitalize="none" spellcheck="false">
        <div class="hint-text">答對後按 [Return / Enter] 繼續</div>
    </div>

<script>
    // --- 詞庫數據 ---
    const database = {
        hira: [
            { q: "ありがとう", a: "arigatou", m: "謝謝" },
            { q: "さくら", a: "sakura", m: "櫻花" },
            { q: "たべる", a: "taberu", m: "吃" },
            { q: "おはよう", a: "ohayou", m: "早安" },
            { q: "ねこ", a: "neko", m: "貓" }
        ],
        kata: [
            { q: "カメラ", a: "kamera", m: "照相機" },
            { q: "スシ", a: "sushi", m: "壽司" },
            { q: "トイレ", a: "toire", m: "廁所" },
            { q: "アメリカ", a: "amerika", m: "美國" },
            { q: "パン", a: "pan", m: "麵包" },
        ]
    };

    // 五十音數據庫 (清音、濁音、拗音)
    const kanaGroups = {
        hira: {
            seion: [
                { label: "あ行", items: [{q:"あ",a:"a"},{q:"い",a:"i"},{q:"う",a:"u"},{q:"え",a:"e"},{q:"お",a:"o"}] },
                { label: "か行", items: [{q:"か",a:"ka"},{q:"き",a:"ki"},{q:"く",a:"ku"},{q:"け",a:"ke"},{q:"こ",a:"ko"}] },
                { label: "さ行", items: [{q:"さ",a:"sa"},{q:"し",a:"shi"},{q:"す",a:"su"},{q:"せ",a:"se"},{q:"そ",a:"so"}] },
                { label: "た行", items: [{q:"た",a:"ta"},{q:"ち",a:"chi"},{q:"つ",a:"tsu"},{q:"て",a:"te"},{q:"と",a:"to"}] },
                { label: "な行", items: [{q:"な",a:"na"},{q:"に",a:"ni"},{q:"ぬ",a:"nu"},{q:"ね",a:"ne"},{q:"ノ",a:"no"}] },
                { label: "は行", items: [{q:"は",a:"ha"},{q:"ひ",a:"hi"},{q:"ふ",a:"fu"},{q:"へ",a:"he"},{q:"ほ",a:"ho"}] },
                { label: "ま行", items: [{q:"ま",a:"ma"},{q:"み",a:"mi"},{q:"む",a:"mu"},{q:"め",a:"me"},{q:"も",a:"mo"}] },
                { label: "や行", items: [{q:"や",a:"ya"},{q:"ゆ",a:"yu"},{q:"よ",a:"yo"}] },
                { label: "ら行", items: [{q:"ら",a:"ra"},{q:"り",a:"ri"},{q:"る",a:"ru"},{q:"れ",a:"re"},{q:"ろ",a:"ro"}] },
                { label: "わ行", items: [{q:"わ",a:"wa"},{q:"を",a:"wo"},{q:"ん",a:"n"}] }
            ],
            dakuon: [
                { label: "が行", items: [{q:"が",a:"ga"},{q:"ぎ",a:"gi"},{q:"ぐ",a:"gu"},{q:"げ",a:"ge"},{q:"ご",a:"go"}] },
                { label: "ざ行", items: [{q:"ざ",a:"za"},{q:"じ",a:"ji"},{q:"ず",a:"zu"},{q:"ぜ",a:"ze"},{q:"ぞ",a:"zo"}] },
                { label: "だ行", items: [{q:"だ",a:"da"},{q:"ぢ",a:"di"},{q:"づ",a:"du"},{q:"で",a:"de"},{q:"ど",a:"do"}] },
                { label: "ば行", items: [{q:"ば",a:"ba"},{q:"び",a:"bi"},{q:"ぶ",a:"bu"},{q:"べ",a:"be"},{q:"ぼ",a:"bo"}] },
                { label: "ぱ行", items: [{q:"ぱ",a:"pa"},{q:"ぴ",a:"pi"},{q:"ぷ",a:"pu"},{q:"ぺ",a:"pe"},{q:"ぽ",a:"po"}] }
            ],
            youon: [
                { label: "きゃ行", items: [{q:"きゃ",a:"kya"},{q:"きゅ",a:"kyu"},{q:"きょ",a:"kyo"}] },
                { label: "しゃ行", items: [{q:"しゃ",a:"sha"},{q:"しゅ",a:"shu"},{q:"しょ",a:"sho"}] },
                { label: "ちゃ行", items: [{q:"ちゃ",a:"cha"},{q:"ちゅ",a:"chu"},{q:"ちょ",a:"cho"}] },
                { label: "にゃ行", items: [{q:"にゃ",a:"nya"},{q:"にゅ",a:"nyu"},{q:"にょ",a:"nyo"}] },
                { label: "ひゃ行", items: [{q:"ひゃ",a:"hya"},{q:"ひゅ",a:"hyu"},{q:"ひょ",a:"hyo"}] },
                { label: "みゃ行", items: [{q:"みゃ",a:"mya"},{q:"みゅ",a:"myu"},{q:"みょ",a:"myo"}] },
                { label: "りゃ行", items: [{q:"りゃ",a:"rya"},{q:"りゅ",a:"ryu"},{q:"りょ",a:"ryo"}] },
                { label: "ぎゃ行", items: [{q:"ぎゃ",a:"gya"},{q:"ぎゅ",a:"gyu"},{q:"ぎょ",a:"gyo"}] },
                { label: "じゃ行", items: [{q:"じゃ",a:"ja"},{q:"じゅ",a:"ju"},{q:"じょ",a:"jo"}] },
                { label: "びゃ行", items: [{q:"びゃ",a:"bya"},{q:"びゅ",a:"byu"},{q:"びょ",a:"byo"}] },
                { label: "ぴゃ行", items: [{q:"ぴゃ",a:"pya"},{q:"ぴゅ",a:"pyu"},{q:"ぴょ",a:"pya"}] }
            ]
        },
        kata: {
            seion: [
                { label: "ア行", items: [{q:"ア",a:"a"},{q:"イ",a:"i"},{q:"ウ",a:"u"},{q:"エ",a:"e"},{q:"オ",a:"o"}] },
                { label: "カ行", items: [{q:"カ",a:"ka"},{q:"キ",a:"ki"},{q:"ク",a:"ku"},{q:"ケ",a:"ke"},{q:"コ",a:"ko"}] },
                { label: "サ行", items: [{q:"サ",a:"sa"},{q:"シ",a:"shi"},{q:"ス",a:"su"},{q:"セ",a:"se"},{q:"ソ",a:"so"}] },
                { label: "タ行", items: [{q:"タ",a:"ta"},{q:"チ",a:"chi"},{q:"ツ",a:"tsu"},{q:"テ",a:"te"},{q:"ト",a:"to"}] },
                { label: "ナ行", items: [{q:"ナ",a:"na"},{q:"ニ",a:"ni"},{q:"ヌ",a:"nu"},{q:"ネ",a:"ne"},{q:"ノ",a:"no"}] },
                { label: "ハ行", items: [{q:"ハ",a:"ha"},{q:"ヒ",a:"hi"},{q:"フ",a:"fu"},{q:"ヘ",a:"he"},{q:"ホ",a:"ho"}] },
                { label: "マ行", items: [{q:"マ",a:"ma"},{q:"ミ",a:"mi"},{q:"ム",a:"mu"},{q:"メ",a:"me"},{q:"モ",a:"mo"}] },
                { label: "ヤ行", items: [{q:"ヤ",a:"ya"},{q:"ユ",a:"yu"},{q:"ヨ",a:"yo"}] },
                { label: "ラ行", items: [{q:"ラ",a:"ra"},{q:"リ",a:"ri"},{q:"ル",a:"ru"},{q:"レ",a:"re"},{q:"ロ",a:"ro"}] },
                { label: "ワ行", items: [{q:"ワ",a:"wa"},{q:"ヲ",a:"wo"},{q:"ン",a:"n"}] }
            ],
            dakuon: [
                { label: "ガ行", items: [{q:"ガ",a:"ga"},{q:"ギ",a:"gi"},{q:"グ",a:"gu"},{q:"ゲ",a:"ge"},{q:"ゴ",a:"go"}] },
                { label: "ザ行", items: [{q:"ザ",a:"za"},{q:"ジ",a:"ji"},{q:"ズ",a:"zu"},{q:"ゼ",a:"ze"},{q:"ゾ",a:"zo"}] },
                { label: "ダ行", items: [{q:"ダ",a:"da"},{q:"ヂ",a:"di"},{q:"づ",a:"du"},{q:"デ",a:"de"},{q:"ド",a:"do"}] },
                { label: "バ行", items: [{q:"バ",a:"ba"},{q:"ビ",a:"bi"},{q:"ブ",a:"bu"},{q:"ベ",a:"be"},{q:"ボ",a:"bo"}] },
                { label: "パ行", items: [{q:"パ",a:"pa"},{q:"ピ",a:"pi"},{q:"プ",a:"pu"},{q:"ペ",a:"pe"},{q:"ポ",a:"po"}] }
            ],
            youon: [
                { label: "キャ行", items: [{q:"キャ",a:"kya"},{q:"キュ",a:"kyu"},{q:"キョ",a:"kyo"}] },
                { label: "シャ行", items: [{q:"シャ",a:"sha"},{q:"シュ",a:"shu"},{q:"ショ",a:"sho"}] },
                { label: "チャ行", items: [{q:"チャ",a:"cha"},{q:"チュ",a:"chu"},{q:"チョ",a:"cho"}] },
                { label: "ニャ行", items: [{q:"ニャ",a:"nya"},{q:"ニュ",a:"nyu"},{q:"ニョ",a:"nyo"}] },
                { label: "ヒャ行", items: [{q:"ヒャ",a:"hya"},{q:"ヒュ",a:"hyu"},{q:"ヒョ",a:"hyo"}] },
                { label: "ミャ行", items: [{q:"ミャ",a:"mya"},{q:"ミュ",a:"myu"},{q:"ミョ",a:"myo"}] },
                { label: "リャ行", items: [{q:"リャ",a:"rya"},{q:"リュ",a:"ryu"},{q:"リョ",a:"ryo"}] },
                { label: "ギャ行", items: [{q:"ギャ",a:"gya"},{q:"ギュ",a:"gyu"},{q:"ギョ",a:"gyo"}] },
                { label: "ジャ行", items: [{q:"ジャ",a:"ja"},{q:"ジュ",a:"ju"},{q:"ジョ",a:"jo"}] },
                { label: "ビャ行", items: [{q:"ビャ",a:"bya"},{q:"ビュ",a:"byu"},{q:"ビョ",a:"byo"}] },
                { label: "ピャ行", items: [{q:"ピャ",a:"pya"},{q:"ピュ",a:"pyu"},{q:"ピョ",a:"pya"}] }
            ]
        }
    };

    let isRandom = true; 
    let currentQuizList = [];
    let currentIdx = 0;
    let isWaiting = false;
    
    let selectedGroups = {
        hira: { seion: [], dakuon: [], youon: [] },
        kata: { seion: [], dakuon: [], youon: [] }
    };

    const homeScreen = document.getElementById('home-screen');
    const selectScreen = document.getElementById('select-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const wordEl = document.getElementById('word');
    const inputEl = document.getElementById('input-field');
    const visualEl = document.getElementById('visual-input');
    const meaningEl = document.getElementById('meaning');

    function initSelectScreen() {
        const categories = ['hira', 'kata'];
        const subTypes = ['seion', 'dakuon', 'youon'];
        
        categories.forEach(cat => {
            subTypes.forEach(sub => {
                const gridEl = document.getElementById(`${cat}-${sub}-grid`);
                gridEl.innerHTML = '';
                kanaGroups[cat][sub].forEach((group, index) => {
                    gridEl.appendChild(createCheckboxElement(cat, sub, index, group.label));
                });
            });
        });
    }

    function createCheckboxElement(cat, sub, index, label) {
        const btn = document.createElement('div');
        btn.className = 'checkbox-btn';
        btn.id = `btn-${cat}-${sub}-${index}`; 
        btn.innerText = label;
        
        if (selectedGroups[cat][sub].includes(index)) {
            btn.classList.add('checked');
        }

        btn.onclick = () => {
            toggleItem(cat, sub, index, btn);
        };
        return btn;
    }

    function toggleItem(cat, sub, index, element) {
        const isChecked = element.classList.toggle('checked');
        if (isChecked) {
            if (!selectedGroups[cat][sub].includes(index)) {
                selectedGroups[cat][sub].push(index);
            }
        } else {
            selectedGroups[cat][sub] = selectedGroups[cat][sub].filter(i => i !== index);
        }
    }

    function bulkSelect(cat, sub, shouldSelectAll) {
        const maxCount = kanaGroups[cat][sub].length;
        
        if (shouldSelectAll) {
            selectedGroups[cat][sub] = Array.from({length: maxCount}, (_, i) => i);
        } else {
            selectedGroups[cat][sub] = [];
        }

        for (let i = 0; i < maxCount; i++) {
            const btn = document.getElementById(`btn-${cat}-${sub}-${i}`);
            if (btn) {
                btn.classList.toggle('checked', shouldSelectAll);
            }
        }
    }

    function openSelectScreen() {
        selectedGroups = {
            hira: { seion: [], dakuon: [], youon: [] },
            kata: { seion: [], dakuon: [], youon: [] }
        };
        initSelectScreen();
        homeScreen.classList.remove('active');
        selectScreen.classList.add('active');
    }

    function goHomeFromSelect() {
        selectScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }

    function startCustomQuiz() {
        let combinedList = [];
        const categories = ['hira', 'kata'];
        const subTypes = ['seion', 'dakuon', 'youon'];

        categories.forEach(cat => {
            subTypes.forEach(sub => {
                selectedGroups[cat][sub].forEach(idx => {
                    kanaGroups[cat][sub][idx].items.forEach(item => {
                        combinedList.push({ q: item.q, a: item.a, m: "基礎單音" });
                    });
                });
            });
        });

        if (combinedList.length === 0) {
            alert("請至少選擇一個音行進行練習！");
            return;
        }

        if (isRandom) {
            combinedList = combinedList.sort(() => Math.random() - 0.5);
        }

        currentQuizList = combinedList;
        currentIdx = 0;
        isWaiting = false;

        selectScreen.classList.remove('active');
        quizScreen.classList.add('active');
        nextQuestion();
    }

    function setOrder(random) {
        isRandom = random;
        document.getElementById('btn-random').classList.toggle('selected', random);
        document.getElementById('btn-order').classList.toggle('selected', !random);
    }

    function startQuiz(mode) {
        let list = [...database[mode]];
        if (isRandom) {
            list = list.sort(() => Math.random() - 0.5);
        }
        currentQuizList = list;
        currentIdx = 0;
        isWaiting = false;
        
        homeScreen.classList.remove('active');
        quizScreen.classList.add('active');
        nextQuestion();
    }

    function goHome(event) {
        event.stopPropagation();
        homeScreen.classList.add('active');
        quizScreen.classList.remove('active');
        inputEl.blur();
    }

    function nextQuestion() {
        if (currentIdx >= currentQuizList.length) {
            alert("練習結束！");
            goHome(new Event('click'));
            return;
        }

        meaningEl.classList.remove('show');
        meaningEl.innerText = ""; 
        visualEl.innerText = "";
        inputEl.value = "";
        isWaiting = false;

        setTimeout(() => {
            const data = currentQuizList[currentIdx];
            wordEl.innerText = data.q;
            wordEl.style.color = "white";
            meaningEl.innerText = data.m; 
            inputEl.focus();
        }, 50); 
    }

    inputEl.addEventListener('input', (e) => {
        if (isWaiting) return;
        const val = e.target.value.toLowerCase();
        visualEl.innerText = val;
        const target = currentQuizList[currentIdx].a;

        if (target.startsWith(val)) {
            if (val === target) {
                isWaiting = true; 
                meaningEl.classList.add('show');
                wordEl.style.color = "var(--accent)";
                
                const ut = new SpeechSynthesisUtterance(currentQuizList[currentIdx].q);
                ut.lang = 'ja-JP';
                speechSynthesis.speak(ut);
            }
        } else {
            wordEl.classList.add('shake');
            setTimeout(() => wordEl.classList.remove('shake'), 200);
            inputEl.value = "";
            visualEl.innerText = "";
        }
    });

    inputEl.addEventListener('keydown', (e) => {
        if (isWaiting && (e.key === 'Enter' || e.keyCode === 13)) {
            e.preventDefault(); 
            currentIdx++;
            nextQuestion();
        }
    });

    function handleScreenClick() {
        if (isWaiting) {
            currentIdx++;
            nextQuestion();
        } else {
            inputEl.focus();
        }
    }
</script>
